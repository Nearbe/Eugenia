[project]
name = "visualizations"
version = "0.1.0"
description = "Delta field visualizations for MNIST, PNG, and CMYK data"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "numpy",
    "scipy",
    "matplotlib",
    "Pillow",
    "torch",
    "tqdm",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-mpl",
    "ruff",
    "mypy",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
